name: Update Repository Count

on:
  push:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get repository count
        run: |
          COUNT=$(curl -s https://api.github.com/users/00arsalan00 | jq '.public_repos')
          sed -i "s/Repositories-[0-9]\+/Repositories-$COUNT/" README.md || \
          sed -i "s/Repositories-REPO_COUNT/Repositories-$COUNT/" README.md

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git diff --cached --quiet || git commit -m "Update repository count"
          git push
