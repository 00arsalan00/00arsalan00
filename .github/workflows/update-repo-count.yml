name: Update Repository Count

on:
  push:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update repository count
        run: |
          COUNT=$(curl -s https://api.github.com/users/00arsalan00 | jq -r '.public_repos')
          sed -i "s/REPO_COUNT/$COUNT/g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update repository count"
          git push
